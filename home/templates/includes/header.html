{% load static %}
<style>
    /* JavaScript control ke liye search bar ko default mein hidden rakhein */
    #search-bar {
      display: none;
    }
</style>

<header class="bg-white text-gray-800 shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        
        <div class="flex-shrink-0">
          <img class="h-10 w-auto" src="{{settings_obj.logo.url}}" alt="Fairdeal Logo">
        </div>

        <nav class="hidden md:flex space-x-1 lg:space-x-3 items-center">
          <a href="/" class="text-gray-700 hover:text-gray-900 border-b-2 border-orange-500 pb-1 px-1">Home</a>
          <a href="{% url "about" %}" class="text-gray-700 hover:text-gray-900 pb-1 px-1">About</a>
          <a href="{% url "services" %}" class="text-gray-700 hover:text-gray-900 pb-1 px-1">Services</a>
          <a href="#" class="text-gray-700 hover:text-gray-900 pb-1 px-1">Spaces</a>
          <a href="{% url "jobs:career" %}" class="text-gray-700 hover:text-gray-900 pb-1 px-1">Career</a>
          <a href="{% url "investment_properties" %}" class="text-gray-700 hover:text-gray-900 pb-1 px-1">Investment</a>
          <a href="{% url "landlords" %}" class="text-gray-700 hover:text-gray-900 pb-1 px-1">Landlords</a>
          <a href="{% url "resources" %}" class="text-gray-700 hover:text-gray-900 pb-1 px-1">Resources</a>
          <a href="{% url "contact" %}" class="text-gray-700 hover:text-gray-900 pb-1 px-1">Contact</a>
        </nav>

        <div class="flex items-center space-x-4">
          <button id="search-toggle" class="p-1 rounded-full text-gray-600 hover:text-gray-900 hover:bg-gray-100 focus:outline-none">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </button>

          <button id="mobile-menu-toggle" class="md:hidden p-1 rounded-full text-gray-600 hover:text-gray-900 hover:bg-gray-100 focus:outline-none">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div id="search-bar" class="bg-gray-100 p-6 shadow-inner relative border-t border-gray-200">
      <div class="max-w-3xl mx-auto flex items-center justify-between">
        <div class="flex-grow pr-4">
          <input type="text" placeholder="Search..." class="w-full text-2xl font-semibold bg-transparent border-b-2 border-orange-500 focus:outline-none">
          <p class="text-sm text-gray-500 mt-1">Hit enter to search or ESC to close</p>
        </div>
        <button id="search-close" class="text-gray-500 hover:text-gray-800 focus:outline-none rounded-full p-2 bg-white">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100 p-4">
      <a href="/" class="block text-gray-800 hover:text-orange-500 py-2 border-l-4 border-orange-500 pl-3">Home</a>
      <a href="{% url "about" %}" class="block text-gray-700 hover:text-gray-900 py-2 pl-4">About</a>
      <a href="{% url "services" %}" class="block text-gray-700 hover:text-gray-900 py-2 pl-4">Services</a>
      <a href="{% url "jobs:career" %}" class="block text-gray-700 hover:text-gray-900 py-2 pl-4">Spaces</a>
      <a href="{% url "services" %}" class="block text-gray-700 hover:text-gray-900 py-2 pl-4">Career</a>
      <a href="{% url "investment_properties" %}" class="block text-gray-700 hover:text-gray-900 py-2 pl-4">Investment</a>
      <a href="{% url "landlords" %}" class="block text-gray-700 hover:text-gray-900 py-2 pl-4">Landlords</a>
      <a href="{% url "resources" %}" class="block text-gray-700 hover:text-gray-900 py-2 pl-4">Resources</a>
      <a href="{% url "contact" %}" class="block text-gray-700 hover:text-gray-900 py-2 pl-4">Contact</a>
    </div>

</header>

<script>
  // Search toggle control
  const searchToggle = document.getElementById('search-toggle');
  const searchBar = document.getElementById('search-bar');
  const searchClose = document.getElementById('search-close');

  searchToggle.addEventListener('click', () => {
    searchBar.style.display = searchBar.style.display === 'block' ? 'none' : 'block';
  });

  searchClose.addEventListener('click', () => {
    searchBar.style.display = 'none';
  });

  // ESC key se search bar close karein
  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && searchBar.style.display === 'block') {
      searchBar.style.display = 'none';
    }
  });

  // Mobile menu toggle control
  const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
  const mobileMenu = document.getElementById('mobile-menu');

  mobileMenuToggle.addEventListener('click', () => {
    mobileMenu.classList.toggle('hidden');
  });
</script>
